AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 Web Server desde GitHub Actions - Parcial Colaborativo

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir acceso HTTP al servidor web
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SG-Parcial-GitHubActions
        - Key: Proyecto
          Value: Parcial-Colaborativo-AWS

  MyEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: EC2-Parcial-Colaborativo
        - Key: Proyecto
          Value: GitHubActions-CloudFormation
        - Key: Integrantes
          Value: Equipo-Parcial
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y

          yum install -y nginx git htop tree

          systemctl enable nginx
          systemctl start nginx

          cat > /usr/share/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Parcial AWS | GitHub Actions</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }

                  body {
                      min-height: 100vh;
                      font-family: Arial, Helvetica, sans-serif;
                      background:
                          radial-gradient(circle at top left, rgba(56, 189, 248, 0.35), transparent 35%),
                          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.30), transparent 35%),
                          linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
                      color: #ffffff;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      overflow: hidden;
                      padding: 30px;
                  }

                  .grid-bg {
                      position: fixed;
                      inset: 0;
                      background-image:
                          linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
                      background-size: 45px 45px;
                      mask-image: radial-gradient(circle, black 25%, transparent 75%);
                      -webkit-mask-image: radial-gradient(circle, black 25%, transparent 75%);
                  }

                  .card {
                      position: relative;
                      z-index: 2;
                      width: 92%;
                      max-width: 950px;
                      padding: 45px;
                      border-radius: 28px;
                      background: rgba(15, 23, 42, 0.78);
                      border: 1px solid rgba(255, 255, 255, 0.18);
                      box-shadow:
                          0 30px 80px rgba(0, 0, 0, 0.55),
                          0 0 60px rgba(56, 189, 248, 0.15);
                      backdrop-filter: blur(18px);
                      text-align: center;
                      animation: entrada 0.9s ease-out;
                  }

                  .badge {
                      display: inline-flex;
                      align-items: center;
                      gap: 10px;
                      padding: 10px 18px;
                      border-radius: 999px;
                      background: rgba(34, 197, 94, 0.12);
                      border: 1px solid rgba(34, 197, 94, 0.45);
                      color: #86efac;
                      font-weight: bold;
                      font-size: 14px;
                      margin-bottom: 25px;
                      letter-spacing: 0.5px;
                  }

                  .dot {
                      width: 10px;
                      height: 10px;
                      border-radius: 50%;
                      background: #22c55e;
                      box-shadow: 0 0 16px #22c55e;
                      animation: pulso 1.6s infinite;
                  }

                  h1 {
                      font-size: 46px;
                      line-height: 1.1;
                      margin-bottom: 18px;
                      background: linear-gradient(90deg, #ffffff, #93c5fd, #67e8f9);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                  }

                  .subtitle {
                      font-size: 20px;
                      color: #cbd5e1;
                      max-width: 760px;
                      margin: 0 auto 32px auto;
                      line-height: 1.6;
                  }

                  .tech-grid {
                      display: grid;
                      grid-template-columns: repeat(4, 1fr);
                      gap: 18px;
                      margin: 35px 0;
                  }

                  .tech-card {
                      padding: 24px 14px;
                      border-radius: 20px;
                      background: rgba(255, 255, 255, 0.07);
                      border: 1px solid rgba(255, 255, 255, 0.10);
                      transition: transform 0.3s ease, background 0.3s ease, border 0.3s ease;
                  }

                  .tech-card:hover {
                      transform: translateY(-6px);
                      background: rgba(56, 189, 248, 0.13);
                      border: 1px solid rgba(56, 189, 248, 0.45);
                  }

                  .tech-icon {
                      display: block;
                      font-size: 34px;
                      margin-bottom: 10px;
                  }

                  .tech-title {
                      font-size: 15px;
                      font-weight: bold;
                      color: #f8fafc;
                  }

                  .info {
                      display: grid;
                      grid-template-columns: repeat(3, 1fr);
                      gap: 14px;
                      margin-top: 28px;
                  }

                  .info-box {
                      border-radius: 16px;
                      padding: 18px;
                      background: rgba(2, 6, 23, 0.55);
                      border: 1px solid rgba(148, 163, 184, 0.20);
                  }

                  .info-box strong {
                      display: block;
                      color: #67e8f9;
                      margin-bottom: 6px;
                      font-size: 14px;
                  }

                  .info-box span {
                      color: #e2e8f0;
                      font-size: 14px;
                  }

                  .footer {
                      margin-top: 32px;
                      padding-top: 22px;
                      border-top: 1px solid rgba(255,255,255,0.10);
                      color: #94a3b8;
                      font-size: 14px;
                  }

                  @keyframes pulso {
                      0% { transform: scale(1); opacity: 1; }
                      50% { transform: scale(1.5); opacity: 0.45; }
                      100% { transform: scale(1); opacity: 1; }
                  }

                  @keyframes entrada {
                      from {
                          opacity: 0;
                          transform: translateY(30px) scale(0.98);
                      }
                      to {
                          opacity: 1;
                          transform: translateY(0) scale(1);
                      }
                  }

                  @media(max-width: 800px) {
                      h1 {
                          font-size: 32px;
                      }

                      .subtitle {
                          font-size: 16px;
                      }

                      .tech-grid {
                          grid-template-columns: repeat(2, 1fr);
                      }

                      .info {
                          grid-template-columns: 1fr;
                      }

                      .card {
                          padding: 30px 20px;
                      }
                  }
              </style>
          </head>
          <body>
              <div class="grid-bg"></div>

              <main class="card">
                  <div class="badge">
                      <span class="dot"></span>
                      DESPLIEGUE ACTIVO EN AWS
                  </div>

                  <h1>Infraestructura desplegada con GitHub Actions</h1>

                  <p class="subtitle">
                      Esta página fue generada automáticamente desde una instancia EC2,
                      creada mediante CloudFormation y actualizada desde un repositorio colaborativo en GitHub.
                  </p>

                  <section class="tech-grid">
                      <div class="tech-card">
                          <span class="tech-icon">☁️</span>
                          <span class="tech-title">AWS EC2</span>
                      </div>

                      <div class="tech-card">
                          <span class="tech-icon">🧩</span>
                          <span class="tech-title">CloudFormation</span>
                      </div>

                      <div class="tech-card">
                          <span class="tech-icon">🚀</span>
                          <span class="tech-title">GitHub Actions</span>
                      </div>

                      <div class="tech-card">
                          <span class="tech-icon">🌐</span>
                          <span class="tech-title">NGINX</span>
                      </div>
                  </section>

                  <section class="info">
                      <div class="info-box">
                          <strong>Repositorio</strong>
                          <span>Trabajo en pareja</span>
                      </div>

                      <div class="info-box">
                          <strong>Archivo modificado</strong>
                          <span>template/ec2.yaml</span>
                      </div>

                      <div class="info-box">
                          <strong>Estado</strong>
                          <span>Servicio web en línea</span>
                      </div>
                  </section>

                  <div class="footer">
                      Parcial AWS: colaboración, ramas, commits, pull request, deploy y destroy automatizado.
                  </div>
              </main>
          </body>
          </html>
          EOF

          cat > /etc/motd << 'EOF'

          ==========================================
             EC2 desplegada correctamente en AWS
          ==========================================
          Servicio web: NGINX activo
          Despliegue: GitHub Actions
          Infraestructura: CloudFormation
          Proyecto: Parcial colaborativo

          EOF

Outputs:
  InstanceId:
    Description: ID de la instancia EC2 creada
    Value: !Ref MyEC2

  PublicIP:
    Description: IP publica de la instancia EC2
    Value: !GetAtt MyEC2.PublicIp

  WebsiteURL:
    Description: URL publica del servidor web
    Value: !Sub "http://${MyEC2.PublicDnsName}"